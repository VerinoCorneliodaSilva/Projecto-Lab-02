<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preferências de notícias">
  <title>Preferências - NewsAI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-logo">
        📰 NewsAI
      </div>
      <div class="header-actions">
        <button id="menu-toggle" class="btn btn-secondary btn-small" style="display: none;">☰ Menu</button>
        <button id="theme-toggle" class="btn btn-secondary btn-small" title="Alternar tema">🌙</button>
        <div class="user-menu">
          <span class="user-name" id="user-name">Utilizador</span>
          <button id="logout-btn" class="btn btn-secondary btn-small">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav>
        <ul>
          <li><a href="dashboard.html" data-route="dashboard.html" class="nav-link" data-page="dashboard">📰 Feed</a></li>
          <li><a href="preferences.html" data-route="preferences.html" class="nav-link active" data-page="preferences">⚙️ Preferências</a></li>
          <li><a href="saved.html" data-route="saved.html" class="nav-link" data-page="saved">💾 Salvos</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Content Area -->
    <div class="content">
      <div id="preferences-page">
        <h1>⚙️ Preferências</h1>
        <p style="color: var(--color-text-muted); margin-bottom: 2rem;">
          Personalize a sua experiência selecionando as categorias que mais o interessam.
        </p>

        <form id="preferences-form" class="card" style="max-width: 600px;">
          <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 1rem; display: block;">Categorias de Interesse</label>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="business" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Negócios
              </label>
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="technology" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Tecnologia
              </label>
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="health" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Saúde
              </label>
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="science" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Ciência
              </label>
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="sports" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Desporto
              </label>
              <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
                <input type="checkbox" name="categories" value="entertainment" style="width: 1rem; height: 1rem; cursor: pointer; margin-right: 0.5rem;">
                Entretenimento
              </label>
            </div>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label for="keywords">Palavras-chave Personalizadas</label>
            <input type="text" id="keywords" name="keywords" placeholder="Ex: Python, Futebol, Inovação (separadas por vírgula)">
            <p style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.5rem;">
              Digite palavras-chave separadas por vírgula para receber notícias mais personalizadas.
            </p>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label for="language">Idioma Preferido</label>
            <select id="language" name="language">
              <option value="pt">Português</option>
              <option value="en">Inglês</option>
              <option value="es">Espanhol</option>
              <option value="fr">Francês</option>
              <option value="de">Alemão</option>
            </select>
          </div>

          <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">💾 Guardar Preferências</button>
            <button type="button" class="btn btn-secondary" id="reset-btn">↻ Repor</button>
          </div>

          <div id="preferences-message" style="margin-top: 1rem;"></div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="js/preferences.js"></script>
</body>
</html>
