<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Agregador de notícias com resumos inteligentes de IA">
  <title>NewsAI - Agregador de Notícias</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-logo">
        📰 NewsAI
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-secondary btn-small" title="Alternar tema">🌙</button>
      </div>
    </div>
  </header>

  <main>
    <div class="content">
      <div class="auth-container">
        <div class="card" style="max-width: 400px; margin: 2rem auto;">
          <h1 style="text-align: center; margin-bottom: 2rem; font-size: 1.875rem;">NewsAI</h1>
          <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 2rem;">
            Agregador de notícias com resumos inteligentes de IA
          </p>

          <div id="auth-tabs" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <button class="tab-btn active" data-tab="login" style="flex: 1; padding: 0.75rem; border: none; background: transparent; color: var(--color-primary); font-weight: 600; border-bottom: 2px solid var(--color-primary); cursor: pointer;">
              Login
            </button>
            <button class="tab-btn" data-tab="signup" style="flex: 1; padding: 0.75rem; border: none; background: transparent; color: var(--color-text-muted); font-weight: 600; border-bottom: 2px solid transparent; cursor: pointer;">
              Registo
            </button>
          </div>

          <!-- Login Form -->
          <form id="login-form" style="display: block;">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
              <label for="login-password">Palavra-passe</label>
              <input type="password" id="login-password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
              Entrar
            </button>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" style="display: none;">
            <div class="form-group">
              <label for="signup-name">Nome</label>
              <input type="text" id="signup-name" name="name" required placeholder="Seu nome">
            </div>

            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
              <label for="signup-password">Palavra-passe</label>
              <input type="password" id="signup-password" name="password" required placeholder="••••••••" minlength="6">
            </div>

            <div class="form-group">
              <label for="signup-password-confirm">Confirmar Palavra-passe</label>
              <input type="password" id="signup-password-confirm" name="password_confirm" required placeholder="••••••••" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
              Criar Conta
            </button>
          </form>

          <div id="auth-error" class="alert alert-error" style="display: none; margin-top: 1rem;"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
